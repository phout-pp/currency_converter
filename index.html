<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Real-time Exchange Rates</title>
    <link rel="icon" type="image/png" href="Icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts: Inter as a minimalist alternative to Google Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS for minimalism and rapid UI development -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(229, 231, 235, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-focus:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        /* Custom scrollbar for minimalist look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8 md:py-24">
        <!-- Header / Landing Page Hero -->
        <header class="text-center mb-10 md:mb-16">
            <h1 class="text-3xl md:text-6xl font-bold mb-3 tracking-tight">
                Swift <span class="gradient-text">Exchange</span>
            </h1>
            <p class="text-gray-500 text-base md:text-lg max-w-xs md:max-w-lg mx-auto">
                Real-time currency conversion and market insights.
            </p>
        </header>

        <!-- Main Converter Card (Example.png inspiration) -->
        <main class="mb-12 md:mb-20">
            <div class="glass-card rounded-2xl md:rounded-3xl p-5 md:p-10">
                <div class="grid grid-cols-1 md:grid-cols-7 gap-4 md:gap-6 items-end">
                    <!-- Amount Input -->
                    <div class="md:col-span-2">
                        <label for="amount" class="block text-[10px] md:text-sm font-bold text-gray-400 mb-1 md:mb-2 uppercase tracking-widest">Amount</label>
                        <input type="number" id="amount" value="1" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-lg font-bold input-focus transition-all" placeholder="0.00">
                    </div>

                    <!-- From Currency -->
                    <div class="md:col-span-2">
                        <label for="from-currency" class="block text-[10px] md:text-sm font-bold text-gray-400 mb-1 md:mb-2 uppercase tracking-widest">From</label>
                        <div class="relative">
                            <select id="from-currency" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-base md:text-lg font-bold input-focus transition-all appearance-none cursor-pointer">
                                <!-- Populated by JS -->
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.707 6.586 4.293 8z"/></svg>
                            </div>
                        </div>
                    </div>

                    <!-- Swap Button -->
                    <div class="md:col-span-1 flex justify-center py-2 md:py-0">
                        <button id="swap-btn" class="p-3 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition-colors transform active:scale-90 shadow-sm md:shadow-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                            </svg>
                        </button>
                    </div>

                    <!-- To Currency -->
                    <div class="md:col-span-2">
                        <label for="to-currency" class="block text-[10px] md:text-sm font-bold text-gray-400 mb-1 md:mb-2 uppercase tracking-widest">To</label>
                        <div class="relative">
                            <select id="to-currency" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-base md:text-lg font-bold input-focus transition-all appearance-none cursor-pointer">
                                <!-- Populated by JS -->
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.707 6.586 4.293 8z"/></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Result Display -->
                <div class="mt-8 md:mt-10 pt-6 md:pt-8 border-t border-gray-100 text-center md:text-left">
                    <p id="conversion-summary" class="text-sm md:text-base text-gray-400 mb-1 font-medium">1 USD equals</p>
                    <div class="flex flex-col md:flex-row md:items-baseline justify-center md:justify-start gap-1 md:gap-3">
                        <span id="result-value" class="text-4xl md:text-6xl font-black tracking-tighter">0.00</span>
                        <span id="result-currency" class="text-xl md:text-2xl font-bold text-blue-600/50">THB</span>
                    </div>
                    <p id="last-updated" class="text-[10px] text-gray-300 mt-4 uppercase tracking-widest">Market data as of --:--</p>
                </div>
            </div>
        </main>

        <!-- Live Rates Table (EX2.png inspiration) -->
        <section>
            <div class="flex justify-between items-center mb-5 px-1">
                <h2 class="text-xl md:text-2xl font-bold">Live Rates</h2>
                <div class="text-[10px] md:text-sm font-bold px-3 py-1 bg-green-100 text-green-700 rounded-full flex items-center gap-1.5 uppercase tracking-wider">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    Live
                </div>
            </div>
            <div class="glass-card rounded-2xl md:rounded-3xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50">
                                <th class="px-4 md:px-6 py-4 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest">Currency</th>
                                <th class="px-4 md:px-6 py-4 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest">Rate</th>
                                <th class="px-4 md:px-6 py-4 text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest text-right">24h</th>
                            </tr>
                        </thead>
                        <tbody id="rates-table-body">
                            <tr>
                                <td colspan="3" class="px-6 py-10 text-center text-gray-400 text-sm italic">Updating rates...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-24 text-center text-gray-400 text-sm">
            <p>© 2026 Swift Exchange. Data provided by European Central Bank.</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
